<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>İnteraktif Periyodik Tablo</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Rajdhani:wght@300;400;600;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
  :root {
    --bg: #070a0f;
    --surface: #0d1117;
    --surface2: #161b22;
    --surface3: #21262d;
    --border: #30363d;
    --text: #e6edf3;
    --text-muted: #7d8590;
    --accent: #00d4ff;
    --accent2: #00ff9d;
    --accent3: #ff6b35;
    --neon-blue: #00d4ff;
    --neon-green: #00ff9d;
    --neon-purple: #bf5af2;
    --neon-red: #ff453a;
    --neon-orange: #ff9f0a;
    --neon-yellow: #ffd60a;

    /* Category colors */
    --alkali: #ff6b6b;
    --alkaline: #ffa94d;
    --transition: #4dabf7;
    --post-transition: #69db7c;
    --metalloid: #e599f7;
    --nonmetal: #63e6be;
    --halogen: #f783ac;
    --noble: #a9e34b;
    --lanthanide: #74c0fc;
    --actinide: #ff8787;
    --unknown: #adb5bd;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  header {
    position: relative;
    z-index: 10;
    padding: 16px 24px 8px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, rgba(0,212,255,0.06) 0%, transparent 100%);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }

  header h1 {
    font-family: 'Orbitron', monospace;
    font-size: clamp(14px, 2.5vw, 22px);
    font-weight: 900;
    letter-spacing: 3px;
    background: linear-gradient(135deg, var(--neon-blue), var(--neon-green));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-shadow: none;
    filter: drop-shadow(0 0 20px rgba(0,212,255,0.4));
  }

  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    font-size: 10px;
    font-family: 'Rajdhani', sans-serif;
    font-weight: 600;
    letter-spacing: 0.5px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 4px;
    color: var(--text-muted);
  }

  .legend-dot {
    width: 8px; height: 8px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  .main-layout {
    position: relative;
    z-index: 5;
    display: flex;
    flex-direction: column;
    gap: 0;
    padding: 12px;
  }

  .top-section {
    display: flex;
    gap: 12px;
    align-items: flex-start;
    flex-wrap: wrap;
  }

  .table-wrapper {
    overflow-x: auto;
    flex: 1;
    min-width: 0;
    -webkit-overflow-scrolling: touch;
  }

  .periodic-grid {
    display: grid;
    grid-template-columns: repeat(18, minmax(48px, 1fr));
    grid-template-rows: repeat(10, 56px);
    gap: 3px;
    width: max-content;
    min-width: 100%;
  }

  .element-cell {
    position: relative;
    border-radius: 5px;
    padding: 3px 4px;
    cursor: pointer;
    border: 1px solid rgba(255,255,255,0.06);
    background: var(--surface2);
    transition: all 0.15s ease;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    overflow: hidden;
    user-select: none;
  }

  .element-cell::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--cat-color, #4dabf7);
    opacity: 0.1;
    transition: opacity 0.15s ease;
  }

  .element-cell:hover::before { opacity: 0.25; }
  .element-cell:hover {
    border-color: var(--cat-color, #4dabf7);
    transform: scale(1.12);
    z-index: 100;
    box-shadow: 0 0 16px rgba(0,0,0,0.8), 0 0 8px var(--cat-color, #4dabf7);
  }

  .element-cell.selected {
    border-color: var(--neon-blue);
    box-shadow: 0 0 0 2px var(--neon-blue), 0 0 20px rgba(0,212,255,0.5);
  }

  .element-cell .atomic-num {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    color: var(--text-muted);
    line-height: 1;
  }

  .element-cell .symbol {
    font-family: 'Orbitron', monospace;
    font-size: clamp(13px, 1.4vw, 16px);
    font-weight: 700;
    color: var(--cat-color, #4dabf7);
    line-height: 1;
    text-align: center;
    filter: drop-shadow(0 0 4px var(--cat-color, #4dabf7));
  }

  .element-cell .el-name {
    font-size: 7.5px;
    color: var(--text-muted);
    text-align: center;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1;
    letter-spacing: 0.3px;
  }

  .badge-radio {
    position: absolute;
    top: 1px; right: 2px;
    font-size: 9px;
    line-height: 1;
    filter: drop-shadow(0 0 4px red);
  }

  .badge-unstable {
    position: absolute;
    top: 1px; left: 2px;
    font-size: 9px;
    line-height: 1;
    filter: drop-shadow(0 0 4px gold);
  }

  /* Right panel */
  .right-panel {
    width: 280px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  #three-canvas-container {
    width: 100%;
    height: 220px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: #050810;
    overflow: hidden;
    position: relative;
  }

  #three-canvas-container canvas {
    width: 100% !important;
    height: 100% !important;
  }

  .three-label {
    position: absolute;
    bottom: 8px; left: 0; right: 0;
    text-align: center;
    font-family: 'Orbitron', monospace;
    font-size: 9px;
    letter-spacing: 2px;
    color: rgba(0,212,255,0.5);
    pointer-events: none;
  }

  .detail-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    display: none;
    flex-direction: column;
    gap: 10px;
    animation: slideIn 0.2s ease;
  }

  .detail-card.visible { display: flex; }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .detail-header {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .detail-symbol {
    font-family: 'Orbitron', monospace;
    font-size: 42px;
    font-weight: 900;
    line-height: 1;
  }

  .detail-meta { flex: 1; }

  .detail-name {
    font-family: 'Rajdhani', sans-serif;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 1px;
    color: var(--text);
  }

  .detail-num {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
  }

  .detail-badges {
    display: flex;
    gap: 5px;
    flex-wrap: wrap;
  }

  .badge {
    padding: 2px 7px;
    border-radius: 20px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.5px;
    border: 1px solid currentColor;
    font-family: 'Rajdhani', sans-serif;
  }

  .badge-r { color: #ff453a; border-color: rgba(255,69,58,0.4); background: rgba(255,69,58,0.1); }
  .badge-u { color: #ffd60a; border-color: rgba(255,214,10,0.4); background: rgba(255,214,10,0.1); }

  .detail-stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
  }

  .stat-item {
    background: var(--surface3);
    border-radius: 7px;
    padding: 8px;
    border: 1px solid var(--border);
  }

  .stat-label {
    font-size: 9px;
    color: var(--text-muted);
    letter-spacing: 1px;
    font-family: 'Space Mono', monospace;
    text-transform: uppercase;
    margin-bottom: 3px;
  }

  .stat-value {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--neon-blue);
    font-weight: 700;
  }

  .isotopes-section { }

  .isotopes-label {
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 1px;
    font-family: 'Space Mono', monospace;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .isotopes-list {
    display: flex;
    gap: 5px;
    flex-wrap: wrap;
  }

  .iso-pill {
    background: rgba(0,255,157,0.08);
    border: 1px solid rgba(0,255,157,0.25);
    color: var(--neon-green);
    border-radius: 5px;
    padding: 3px 8px;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
  }

  .placeholder-card {
    background: var(--surface2);
    border: 1px dashed var(--border);
    border-radius: 10px;
    padding: 20px 14px;
    text-align: center;
    color: var(--text-muted);
    font-size: 12px;
    letter-spacing: 0.5px;
  }

  .placeholder-card .big-icon {
    font-size: 32px;
    margin-bottom: 8px;
    opacity: 0.4;
  }

  /* Period/Group labels */
  .period-label, .group-label {
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    color: rgba(255,255,255,0.15);
    cursor: default;
    pointer-events: none;
  }

  /* Gap cell */
  .gap-cell { background: transparent; border: none; cursor: default; }

  /* Series label cells */
  .series-label-cell {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding-right: 6px;
    font-size: 9px;
    font-family: 'Space Mono', monospace;
    color: rgba(255,255,255,0.2);
    letter-spacing: 0.5px;
    cursor: default;
  }

  .element-photo-wrap {
    position: relative;
    width: 100%;
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid var(--border);
    background: #0a0c12;
    flex-shrink: 0;
  }

  .element-photo {
    width: 100%;
    height: 160px;
    object-fit: cover;
    display: block;
    filter: saturate(1.1) contrast(1.05);
    transition: transform 0.4s ease, filter 0.3s ease;
  }

  .element-photo:hover {
    transform: scale(1.04);
    filter: saturate(1.3) contrast(1.1);
  }

  .photo-label {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 4px 8px;
    background: linear-gradient(0deg, rgba(0,0,0,0.75) 0%, transparent 100%);
    font-family: 'Space Mono', monospace;
    font-size: 8px;
    letter-spacing: 1.5px;
    color: rgba(255,255,255,0.4);
    text-align: right;
  }

  @media (max-width: 900px) {
    .top-section { flex-direction: column; }
    .right-panel { width: 100%; flex-direction: row; flex-wrap: wrap; }
    #three-canvas-container { flex: 1; min-width: 200px; height: 180px; }
    .detail-card { flex: 1; min-width: 220px; }
  }
</style>
</head>

</div>

// ─── GRID BUILDER ────────────────────────────────────────────────────────────
const grid = document.getElementById('grid');

// Build lookup map
const cellMap = {};
ELEMENTS.forEach(el => { cellMap[`${el.xp}-${el.yp}`] = el; });

// Special label cells
const seriesLabels = {
  '3-6': 'Ln→',
  '3-7': 'Ac→',
};

// Rows 8: gap row (blank separator between rows 7 and 9)
// Row 8 = visual gap row
for (let row = 1; row <= 10; row++) {
  for (let col = 1; col <= 18; col++) {
    const key = `${col}-${row}`;
    const el = cellMap[key];
    const div = document.createElement('div');

    if (row === 8) {
      // Gap / separator row
      div.className = 'element-cell gap-cell';
      div.style.height = '10px';
      div.style.gridColumn = col;
      div.style.gridRow = row;
      grid.appendChild(div);
      continue;
    }

    if (el) {
      const color = CAT_COLOR[el.cat] || '#adb5bd';
      div.className = 'element-cell';
      div.style.cssText = `grid-column:${col}; grid-row:${row}; --cat-color:${color};`;
      div.dataset.n = el.n;

      div.innerHTML = `
        ${el.radio ? '<span class="badge-radio">☢</span>' : ''}
        ${el.unstable ? '<span class="badge-unstable">⚠</span>' : ''}
        <span class="atomic-num">${el.n}</span>
        <span class="symbol">${el.s}</span>
        <span class="el-name">${el.name}</span>
      `;
      div.addEventListener('click', () => selectElement(el, div));
    } else if (seriesLabels[key]) {
      div.className = 'series-label-cell';
      div.style.cssText = `grid-column:${col}; grid-row:${row};`;
      div.textContent = seriesLabels[key];
    } else {
      div.className = 'element-cell gap-cell';
      div.style.cssText = `grid-column:${col}; grid-row:${row}; background:transparent; border:none;`;
    }

    grid.appendChild(div);
  }
}

// ─── THREE.JS SETUP ──────────────────────────────────────────────────────────
const canvas = document.getElementById('three-canvas');
const container = document.getElementById('three-canvas-container');

const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setClearColor(0x050810, 1);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50, 1, 0.1, 100);
camera.position.set(0, 0, 3.5);

// Lighting
const ambLight = new THREE.AmbientLight(0x112244, 1.5);
scene.add(ambLight);
const pointLight1 = new THREE.PointLight(0x00d4ff, 3, 20);
pointLight1.position.set(3, 3, 3);
scene.add(pointLight1);
const pointLight2 = new THREE.PointLight(0x00ff9d, 2, 20);
pointLight2.position.set(-3, -2, 2);
scene.add(pointLight2);

// Atom nucleus
const nucleusMat = new THREE.MeshPhongMaterial({
  color: 0x00d4ff,
  emissive: 0x004488,
  shininess: 100,
  specular: 0x88ddff,
});
const nucleusGeo = new THREE.SphereGeometry(0.55, 64, 64);
const nucleus = new THREE.Mesh(nucleusGeo, nucleusMat);
scene.add(nucleus);

// Glow ring
const ringGeo = new THREE.TorusGeometry(0.85, 0.02, 16, 100);
const ringMat = new THREE.MeshBasicMaterial({ color: 0x00d4ff, opacity: 0.5, transparent: true });
const ring1 = new THREE.Mesh(ringGeo, ringMat);
ring1.rotation.x = Math.PI / 3;
scene.add(ring1);

const ring2 = new THREE.Mesh(ringGeo.clone(), new THREE.MeshBasicMaterial({ color: 0x00ff9d, opacity: 0.3, transparent: true }));
ring2.rotation.x = -Math.PI / 4;
ring2.rotation.y = Math.PI / 6;
scene.add(ring2);

// Electron
const electronGeo = new THREE.SphereGeometry(0.07, 16, 16);
const electronMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
const electron = new THREE.Mesh(electronGeo, electronMat);
scene.add(electron);

// Particle field (dots around nucleus)
const particlesGeo = new THREE.BufferGeometry();
const pCount = 120;
const pPositions = new Float32Array(pCount * 3);
for (let i = 0; i < pCount; i++) {
  const r = 1.2 + Math.random() * 0.8;
  const theta = Math.random() * Math.PI * 2;
  const phi = Math.random() * Math.PI;
  pPositions[i * 3] = r * Math.sin(phi) * Math.cos(theta);
  pPositions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
  pPositions[i * 3 + 2] = r * Math.cos(phi);
}
particlesGeo.setAttribute('position', new THREE.BufferAttribute(pPositions, 3));
const particlesMat = new THREE.PointsMaterial({ color: 0x00d4ff, size: 0.025, transparent: true, opacity: 0.6 });
const particles = new THREE.Points(particlesGeo, particlesMat);
scene.add(particles);

let isRadioactive = false;
let shakeTime = 0;
let selectedColor = new THREE.Color(0x00d4ff);

function resizeRenderer() {
  const w = container.clientWidth;
  const h = container.clientHeight;
  renderer.setSize(w, h);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
resizeRenderer();
window.addEventListener('resize', resizeRenderer);

let t = 0;
function animate() {
  requestAnimationFrame(animate);
  t += 0.016;

  nucleus.rotation.y = t * 0.4;
  nucleus.rotation.x = t * 0.15;
  ring1.rotation.z = t * 0.6;
  ring2.rotation.y = t * 0.4;
  particles.rotation.y = t * 0.08;
  particles.rotation.x = t * 0.05;

  // Electron orbit
  electron.position.x = Math.cos(t * 1.8) * 0.85;
  electron.position.z = Math.sin(t * 1.8) * 0.85;
  electron.position.y = Math.sin(t * 1.8 * 0.3) * 0.3;

  // Shake effect for radioactive
  if (isRadioactive) {
    shakeTime += 0.016;
    const shake = Math.sin(shakeTime * 18) * 0.06 * (0.5 + 0.5 * Math.sin(shakeTime * 3));
    nucleus.position.x = shake;
    nucleus.position.y = Math.cos(shakeTime * 15) * 0.04;
    pointLight1.intensity = 3 + Math.sin(shakeTime * 12) * 1.5;
  } else {
    shakeTime = 0;
    nucleus.position.x = 0;
    nucleus.position.y = 0;
    pointLight1.intensity = 3;
  }

  // Pulse
  const pulse = 1 + Math.sin(t * 2) * 0.04;
  nucleus.scale.setScalar(pulse);

  renderer.render(scene, camera);
}
animate();

// ─── ELEMENT SELECTION ───────────────────────────────────────────────────────
let selectedCell = null;

function selectElement(el, cellEl) {
  // Deselect previous
  if (selectedCell) selectedCell.classList.remove('selected');
  selectedCell = cellEl;
  cellEl.classList.add('selected');

  // Three.js update
  const color = new THREE.Color(CAT_COLOR[el.cat] || '#4dabf7');
  nucleusMat.color.set(color);
  nucleusMat.emissive.set(color.clone().multiplyScalar(0.3));
  particlesMat.color.set(color);
  ringMat.color.set(color);
  ring2.material.color.set(new THREE.Color(CAT_COLOR[el.cat] || '#00ff9d').lerp(new THREE.Color('#ffffff'), 0.3));
  pointLight1.color.set(color);
  isRadioactive = el.radio;

  // Detail card
  const card = document.getElementById('detail-card');
  const ph = document.getElementById('placeholder');
  ph.style.display = 'none';
  card.className = 'detail-card visible';
  card.style.borderColor = CAT_COLOR[el.cat] || '#30363d';

  const densityVal = el.density !== null ? `${el.density} g/cm³` : 'Bilinmiyor';
  const mpVal = el.mp !== null ? `${el.mp}°C` : 'Bilinmiyor';
  const imgUrl = ELEMENT_IMAGES[el.n];

  const imgHTML = imgUrl ? `
    <div class="element-photo-wrap">
      <img
        class="element-photo"
        src="${imgUrl}"
        alt="${el.name} fotoğrafı"
        loading="lazy"
        onerror="this.parentElement.style.display='none'"
      />
      <div class="photo-label">NUMUNE FOTOĞRAFI</div>
    </div>
  ` : '';

  card.innerHTML = `
    <div class="detail-header">
      <div class="detail-symbol" style="color:${CAT_COLOR[el.cat]};filter:drop-shadow(0 0 10px ${CAT_COLOR[el.cat]})">${el.s}</div>
      <div class="detail-meta">
        <div class="detail-name">${el.name}</div>
        <div class="detail-num">Atom No: ${el.n}</div>
        <div class="detail-badges" style="margin-top:4px">
          ${el.radio ? '<span class="badge badge-r">☢ RADYOAKTİF</span>' : ''}
          ${el.unstable ? '<span class="badge badge-u">⚠ KARARSIZ</span>' : ''}
        </div>
      </div>
    </div>
    ${imgHTML}
    <div class="detail-stats">
      <div class="stat-item">
        <div class="stat-label">YOĞUNLUK</div>
        <div class="stat-value" style="color:${CAT_COLOR[el.cat]}">${densityVal}</div>
      </div>
      <div class="stat-item">
        <div class="stat-label">ERİME NOKTAS.</div>
        <div class="stat-value" style="color:${CAT_COLOR[el.cat]}">${mpVal}</div>
      </div>
    </div>
    <div class="isotopes-section">
      <div class="isotopes-label">İZOTOPLAR</div>
      <div class="isotopes-list">
        ${el.iso.map(i => `<span class="iso-pill">${i}</span>`).join('')}
      </div>
    </div>
  `;
}
